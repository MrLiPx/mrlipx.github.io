<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to mrlipx.com</title>

    <meta http-equiv="refresh" content="0; url=https://me.mrlipx.com/">
    <link rel="canonical" href="https://me.mrlipx.com/">

    <meta property="og:title" content="mrlipx | Developer Portfolio">
    <meta property="og:description" content="Redirecting to the official developer hub of mrlipx.">
    <meta property="og:url" content="https://mrlipx.com/">
    <meta property="og:type" content="website">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0d1117; /* GitHub Dark Mode color */
            color: #c9d1d9;
        }
        .container { text-align: center; }
        a { color: #58a6ff; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .spinner {
            border: 3px solid rgba(255,255,255,.1);
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script type="text/javascript">
        // JavaScript redirect as a backup to the Meta Refresh
        window.location.replace("https://me.mrlipx.com/");
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Redirecting you to <strong>me.mrlipx.com</strong></p>
        <p><small>Not working? <a href="https://me.mrlipx.com/">Click here to jump.</a></small></p>
    </div>
</body>
</html>
