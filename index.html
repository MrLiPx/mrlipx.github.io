<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="2; url=https://mrlipx.dev/">
    <title>Redirecting</title>
    <style>
        body { background: #050505; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        img { width: 48px; height: 48px; }
    </style>
</head>
<body>
    <img src="https://cdn.mrlipx.com/media/images/ui/loading-circle.svg">
    <script>
        let dots = 0;
        setInterval(() => {
            dots = (dots + 1) % 4;
            document.title = "Redirecting" + ".".repeat(dots);
        }, 300);

        setTimeout(() => location.replace("https://mrlipx.dev/"), 1500);
    </script>
</body>
</html>
