<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=https://dev.mrlipx.com/">
    <link rel="canonical" href="https://dev.mrlipx.com/">
    <title>Redirecting</title>
</head>
<body>
    <p>Redirecting to <strong>dev.mrlipx.com</strong> in <span id="timer">3</span>...</p>
    <p><small>Not working? <a href="https://dev.mrlipx.com/">Click here</a>.</small></p>

    <script type="text/javascript">
        var seconds = 3;
        var display = document.getElementById('timer');
        
        var countdown = setInterval(function() {
            seconds--;
            display.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.replace("https://dev.mrlipx.com/");
            }
        }, 1000);
    </script>
</body>
</html>
