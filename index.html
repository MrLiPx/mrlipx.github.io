<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mrlipx</title>
    <style>
        :root { --bg: #050505; --text: #fff; --time: 5s; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .card { text-align: center; width: 280px; }
        #avatar {
            width: 72px; height: 72px; border-radius: 50%;
            margin-bottom: 1rem; border: 1px solid #222;
            background: url('https://cdn.mrlipx.com/media/images/ui/loading-circle.svg') center/cover no-repeat;
        }
        .name { font-size: 1.25rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
        .user { font-size: 0.85rem; color: #666; margin-bottom: 0.75rem; min-height: 1.2em; }
        .bio { font-size: 0.85rem; color: #aaa; margin-bottom: 1.5rem; line-height: 1.5; min-height: 3em; }
        .progress-bg { width: 100px; height: 2px; background: #1a1a1a; margin: 0 auto; overflow: hidden; }
        .progress-fill { 
            width: 100%; height: 100%; background: var(--text); 
            transform: translateX(-100%);
            animation: p var(--time) linear forwards;
        }
        @keyframes p { to { transform: translateX(0); } }
        .status { font-size: 9px; color: #333; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 0.2em; }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <img id="avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <div class="name" id="name">mrlipx</div>
        <div class="user" id="user"></div>
        <div class="bio" id="bio"></div>
        <div class="progress-bg"><div class="progress-fill"></div></div>
        <div class="status">Redirecting <a href="https://dev.mrlipx.com/">dev</a></div>
    </div>

    <script>
        const ID = "163276171", URL = "https://dev.mrlipx.com/", S = 5;

        fetch(`https://api.github.com/user/${ID}`)
            .then(r => r.json())
            .then(d => {
                document.getElementById('avatar').src = d.avatar_url;
                document.getElementById('name').textContent = d.name || d.login;
                document.getElementById('user').textContent = `@${d.login}`;
                document.getElementById('bio').textContent = d.bio || "";
            });

        setTimeout(() => location.replace(URL), S * 1000);
    </script>
</body>
</html>
