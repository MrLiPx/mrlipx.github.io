<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url=https://dev.mrlipx.com/">
    <link rel="canonical" href="https://dev.mrlipx.com/">
    <title>mrlipx</title>
    <style>
        :root { --bg: #050505; --card: #111; --text: #fff; --dim: #888; --accent: #0070f3; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .container {
            text-align: center; opacity: 0; transform: translateY(10px);
            animation: fadeIn 0.8s ease forwards;
        }
        #avatar {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid #333; margin-bottom: 1rem;
        }
        .name { font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
        .bio { color: var(--dim); font-size: 0.9rem; margin: 0.5rem 0 1.5rem; max-width: 300px; }
        
        .loader-container { position: relative; width: 40px; height: 40px; margin: 0 auto; }
        svg { transform: rotate(-90deg); width: 40px; height: 40px; }
        circle {
            fill: none; stroke-width: 4; stroke-linecap: round;
            stroke: #222;
        }
        circle.progress {
            stroke: var(--text);
            stroke-dasharray: 113;
            stroke-dashoffset: 113;
            animation: load 5s linear forwards;
        }

        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes load { to { stroke-dashoffset: 0; } }
        
        .status { font-family: monospace; font-size: 0.75rem; color: var(--dim); margin-top: 1rem; text-transform: uppercase; letter-spacing: 0.1em; }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <img id="avatar" src="" style="display:none;">
        <div class="name" id="username">mrlipx</div>
        <div class="bio" id="bio"></div>
        
        <div class="loader-container">
            <svg>
                <circle cx="20" cy="20" r="18"></circle>
                <circle class="progress" cx="20" cy="20" r="18"></circle>
            </svg>
        </div>
        
        <div class="status">Redirecting to <a href="https://dev.mrlipx.com/">dev</a></div>
    </div>

    <script>
        const API_URL = "https://api.github.com/user/163276171";
        const REDIRECT_URL = "https://dev.mrlipx.com/";

        // Fetch User Data
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('avatar').src = data.avatar_url;
                document.getElementById('avatar').style.display = 'inline-block';
                document.getElementById('username').textContent = data.name || data.login;
                document.getElementById('bio').textContent = data.bio;
            })
            .catch(() => {
                document.getElementById('bio').textContent = "Developer";
            });

        // 5 Second Redirect
        setTimeout(() => {
            window.location.replace(REDIRECT_URL);
        }, 5000);
    </script>
</body>
</html>
