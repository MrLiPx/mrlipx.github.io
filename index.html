<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url=https://dev.mrlipx.com/">
    <link rel="canonical" href="https://dev.mrlipx.com/">
    <title>mrlipx</title>
    <style>
        :root { --bg: #050505; --text: #fff; --accent: #5865F2; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; -webkit-font-smoothing: antialiased;
        }
        .card { text-align: center; }
        #avatar {
            width: 72px; height: 72px; border-radius: 50%;
            background: #111; margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        .name { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
        
        /* Fast Progress Bar */
        .progress-bg { 
            width: 120px; height: 2px; background: #1a1a1a; 
            margin: 0 auto; overflow: hidden; border-radius: 2px;
        }
        .progress-fill { 
            width: 100%; height: 100%; background: var(--text); 
            transform: translateX(-100%);
            animation: progress 5s linear forwards;
        }

        @keyframes progress { to { transform: translateX(0); } }
        
        .status { 
            font-size: 10px; color: #444; margin-top: 1rem; 
            text-transform: uppercase; letter-spacing: 0.2em; 
        }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <img id="avatar" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <div class="name">mrlipx</div>
        
        <div class="progress-bg">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status">Jumping to <a href="https://dev.mrlipx.com/">dev</a></div>
    </div>

    <script>
        const DISCORD_ID = "1150713121560862720"; // Replace with your actual Discord ID
        const REDIRECT_URL = "https://dev.mrlipx.com/";

        // Fetch Discord Avatar via Lanyard API (Fastest Method)
        fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`)
            .then(res => res.json())
            .then(res => {
                const user = res.data.discord_user;
                const avatarHash = user.avatar;
                // Construct Discord Avatar URL
                document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${avatarHash}.png?size=128`;
            })
            .catch(() => {
                // Fallback to a placeholder if Discord fetch fails
                document.getElementById('avatar').src = "https://github.com/mrlipx.png";
            });

        setTimeout(() => window.location.replace(REDIRECT_URL), 5000);
    </script>
</body>
</html>
